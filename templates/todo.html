{% extends 'base.html' %}
{% block content %}
<div class="card">
    <form method="post" style="display: flex; gap: 10px;">
        <input type="text" name="task" placeholder="Задача..." required style="margin:0;">
        <input type="date" name="date" style="margin:0; width: 150px;">
        <button type="submit" style="width: auto;">+</button>
    </form>
</div>

<div class="item-list">
    {% for item in items %}
        <div class="item">
            <div style="display: flex; align-items: center;">
                <a href="{{ url_for('todo_toggle', id=item.id) }}" style="text-decoration: none; margin-right: 10px; font-size: 1.2rem;">
                    {{ '☑' if item.status == 'done' else '☐' }}
                </a>
                <div>
                    <div class="{{ 'done' if item.status == 'done' }}">{{ item.task }}</div>
                    {% if item.date %}
                        <small style="color: var(--accent);">Дедлайн: {{ item.date }}</small>
                    {% endif %}
                </div>
            </div>
            <a href="{{ url_for('delete', category='todo', id=item.id) }}" class="delete-btn">×</a>
        </div>
    {% endfor %}
</div>
{% endblock %}
