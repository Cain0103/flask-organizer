<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super App</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --transition-speed: 2.0s;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-color: #333333;
            --accent: #4a90e2;
            --border: #e1e4e8;
            --shadow: rgba(0,0,0,0.1);
            --gradient: none;
            --bg-opacity: 0; /* Прозрачность картинки фона по умолчанию */
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --accent: #bb86fc;
            --border: #404040;
            --shadow: rgba(0,0,0,0.5);
        }

        [data-theme="harry"] {
            --bg-color: #2c3e50;
            --card-bg: rgba(255, 255, 255, 0.75); 
            --text-color: #003366; 
            --accent: #006994; 
            --border: rgba(255, 255, 255, 0.6);
            --shadow: rgba(0, 50, 100, 0.2);
            --gradient: linear-gradient(120deg, rgba(255, 255, 255, 0.8) 0%, rgba(200, 240, 255, 0.8) 50%, rgba(255, 250, 240, 0.8) 100%);
            --bg-opacity: 1; /* Показываем картинку */
        }

        @keyframes ocean-waves {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- БАЗОВЫЕ СТИЛИ --- */
        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 0;
            min-height: 100vh;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
            position: relative;
        }

        /* Слой для плавного фона (Кот) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("{{ url_for('static', filename='harry.png') }}");
            background-size: cover;
            background-position: center;
            opacity: var(--bg-opacity);
            z-index: -1;
            transition: opacity var(--transition-speed) ease-in-out;
            pointer-events: none;
        }

        header {
            background: var(--card-bg);
            background-image: var(--gradient);
            background-size: 200% 200%;
            padding: 10px 20px;
            box-shadow: 0 2px 10px var(--shadow);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
            transition: all var(--transition-speed) ease;
        }
        
        [data-theme="harry"] header, [data-theme="harry"] .card, [data-theme="harry"] .item {
            animation: ocean-waves 15s ease infinite;
        }

        .nav-links a {
            color: var(--text-color); text-decoration: none; margin: 0 10px;
            font-weight: bold; padding: 5px 10px; border-radius: 5px;
            transition: all 0.3s ease;
        }
        .nav-links a:hover, .nav-links a.active { background: var(--accent); color: white; }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }

        .card {
            background: var(--card-bg);
            background-image: var(--gradient);
            background-size: 200% 200%;
            padding: 20px; border-radius: 15px;
            box-shadow: 0 5px 15px var(--shadow); margin-bottom: 20px;
            border: 1px solid var(--border); backdrop-filter: blur(8px);
            transition: all var(--transition-speed) ease;
        }

        input, select, textarea {
            width: 100%; padding: 10px; margin: 5px 0 15px;
            border: 1px solid var(--border); border-radius: 8px;
            background: rgba(255,255,255,0.5); color: #333; box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        input:focus { outline: none; border-color: var(--accent); }

        button {
            background: var(--accent); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer;
            font-weight: bold; width: 100%;
            transition: background 0.3s ease, transform 0.1s;
        }
        button:active { transform: scale(0.98); }

        .theme-switcher button { width: auto; font-size: 12px; margin-left: 5px; opacity: 0.9; }

        .item-list { list-style: none; padding: 0; }
        .item {
            background: var(--card-bg);
            background-image: var(--gradient);
            background-size: 200% 200%;
            border-bottom: 1px solid var(--border); padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
            transition: all var(--transition-speed) ease;
        }
        .item:first-child { border-top-left-radius: 10px; border-top-right-radius: 10px; }
        .item:last-child { border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; border-bottom: none; }
        
        .done { text-decoration: line-through; opacity: 0.6; }
        .delete-btn { color: #e74c3c; cursor: pointer; text-decoration: none; font-size: 1.2rem; margin-left: 15px; transition: color 0.3s;}
        .delete-btn:hover { color: #c0392b; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 1.2rem;">Organizer 🏝️</div>
    
    {% if session.user_id %}
    <nav class="nav-links">
        <a href="{{ url_for('notes') }}" class="{{ 'active' if page == 'notes' }}">📝 Заметки</a>
        <a href="{{ url_for('shopping') }}" class="{{ 'active' if page == 'shopping' }}">🛒 Покупки</a>
        <a href="{{ url_for('phonebook') }}" class="{{ 'active' if page == 'phonebook' }}">📞 Тел.</a>
        <a href="{{ url_for('blog') }}" class="{{ 'active' if page == 'blog' }}">🖊 Блог</a>
        <a href="{{ url_for('movies') }}" class="{{ 'active' if page == 'movies' }}">🎬 Фильмы</a>
        <a href="{{ url_for('todo') }}" class="{{ 'active' if page == 'todo' }}">✅ ToDo</a>
    </nav>
    {% endif %}

    <div class="theme-switcher">
        <button onclick="setTheme('light')" title="Светлая">☀</button>
        <button onclick="setTheme('dark')" title="Темная">🌙</button>
        <button onclick="setTheme('harry')" title="Режим кота">🐱 Гарри</button>
        {% if session.user_id %}
            <a href="{{ url_for('logout') }}" style="color: var(--text-color); margin-left: 10px; text-decoration:none;">🚪</a>
        {% endif %}
    </div>
</header>

<div class="container">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="card" style="color: #e74c3c; text-align: center; font-weight: bold;">{{ messages[0] }}</div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<script>
    // Аудио (локальный файл)
    const oceanSound = new Audio("{{ url_for('static', filename='ocean.mp3') }}");
    oceanSound.loop = true; 
    oceanSound.volume = 0.1;

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);

        if (theme === 'harry') {
            oceanSound.play().catch(e => console.log("Audio block:", e));
        } else {
            oceanSound.pause();
            oceanSound.currentTime = 0; 
        }
    }
    
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
</script>

</body>
</html>
